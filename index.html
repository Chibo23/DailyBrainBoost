<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Brain Boost - Test Your Mind</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="intro-header">
            <div class="header-content">
                <h1 class="app-title">Daily Brain Boost</h1>
                <p class="tagline">Test Your Mind</p>
            </div>
        </header>

        <!-- Main Content -->
        <main class="intro-main">
            <div class="intro-content">
                <!-- Left Section: Animated Brain Icon -->
                <div class="brain-section">
                    <svg class="brain-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <style>
                                @keyframes pulse-brain {
                                    0%, 100% { opacity: 1; transform: scale(1); }
                                    50% { opacity: 0.7; transform: scale(1.05); }
                                }
                                .brain-main { animation: pulse-brain 2s infinite; }
                            </style>
                        </defs>
                        <!-- Brain outline -->
                        <circle cx="50" cy="45" r="28" fill="none" stroke="#6366F1" stroke-width="2"/>
                        <!-- Brain lobes -->
                        <path d="M 35 35 Q 30 25 35 15 Q 40 20 45 15 Q 50 20 55 15 Q 60 25 55 35" 
                              fill="#A5B4FC" class="brain-main"/>
                        <path d="M 65 40 Q 70 30 75 25 Q 75 35 75 45 Q 70 50 65 48" 
                              fill="#C7D2FE" class="brain-main"/>
                        <!-- Brain center -->
                        <circle cx="50" cy="45" r="8" fill="#818CF8"/>
                        <circle cx="50" cy="45" r="5" fill="#6366F1"/>
                    </svg>
                </div>

                <!-- Right Section: Illustrated Person with Thought Bubble -->
                <div class="illustration-section">
                    <svg class="person-illustration" viewBox="0 0 150 200" xmlns="http://www.w3.org/2000/svg">
                        <!-- Head -->
                        <circle cx="75" cy="30" r="15" fill="#FDB022"/>
                        <!-- Eyes -->
                        <circle cx="70" cy="28" r="2" fill="#000"/>
                        <circle cx="80" cy="28" r="2" fill="#000"/>
                        <!-- Smile -->
                        <path d="M 70 33 Q 75 35 80 33" stroke="#000" stroke-width="1" fill="none"/>
                        <!-- Body -->
                        <path d="M 75 45 L 75 100" stroke="#6366F1" stroke-width="4" fill="none"/>
                        <!-- Arms -->
                        <line x1="75" y1="60" x2="50" y2="80" stroke="#FDB022" stroke-width="4"/>
                        <line x1="75" y1="60" x2="100" y2="80" stroke="#FDB022" stroke-width="4"/>
                        <!-- Legs -->
                        <line x1="75" y1="100" x2="60" y2="140" stroke="#6366F1" stroke-width="4"/>
                        <line x1="75" y1="100" x2="90" y2="140" stroke="#6366F1" stroke-width="4"/>
                        <!-- Shoes -->
                        <circle cx="60" cy="140" r="3" fill="#000"/>
                        <circle cx="90" cy="140" r="3" fill="#000"/>

                        <!-- Thought Bubble -->
                        <g class="thought-bubble">
                            <ellipse cx="110" cy="50" rx="30" ry="25" fill="#FEF3C7" stroke="#FDB022" stroke-width="2"/>
                            <circle cx="95" cy="78" r="6" fill="#FEF3C7" stroke="#FDB022" stroke-width="1.5"/>
                            <circle cx="85" cy="88" r="4" fill="#FEF3C7" stroke="#FDB022" stroke-width="1"/>
                        </g>

                        <!-- Lightbulb in Bubble -->
                        <g class="lightbulb" transform="translate(110, 50)">
                            <circle cx="0" cy="-8" r="6" fill="#FDB022"/>
                            <path d="M -3 0 L -1 3 L 1 3 L 3 0" fill="#6366F1" stroke="#FDB022" stroke-width="0.5"/>
                            <line x1="-1" y1="3" x2="-1" y2="5" stroke="#6366F1" stroke-width="1"/>
                            <line x1="1" y1="3" x2="1" y2="5" stroke="#6366F1" stroke-width="1"/>
                        </g>
                    </svg>

                    <!-- Brain Facts Display -->
                    <div class="brain-facts-bubble">
                        <p id="brain-fact-text" class="fact-text">
                            Your brain generates 23 watts of power, enough to power a light bulb!
                        </p>
                    </div>
                </div>
            </div>

            <!-- Call-to-Action Button -->
            <div class="cta-section">
                <button class="start-button" onclick="navigateToTopics()">
                    Start
                    <span class="button-icon">→</span>
                </button>
            </div>
        </main>
    </div>

    <script src="js/brain-facts.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Initialize brain facts rotation on intro page
        function initBrainFactsRotation() {
            const factElement = document.getElementById('brain-fact-text');
            if (!factElement || brainFacts.length === 0) return;
            
            let currentFactIndex = 0;

            function rotateFact() {
                factElement.style.opacity = '0';
                setTimeout(() => {
                    currentFactIndex = (currentFactIndex + 1) % brainFacts.length;
                    factElement.textContent = brainFacts[currentFactIndex];
                    factElement.style.opacity = '1';
                }, 300);
            }

            setInterval(rotateFact, 4000);
        }

        function navigateToTopics() {
            window.location.href = 'topics.html';
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initBrainFactsRotation);
    </script>
</body>
</html>
